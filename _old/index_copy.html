<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/main.css">
    <title>David Shuppert</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Suez+One">

    <script type = "text/javascript" src = "https://www.tutorialspoint.com/jquery/jquery-3.6.0.js"></script>
    <script src = "jquery.easing.min.js" type = "text/javascript"></script>
    <script> 
    $(function(){
      $("#nav").load("/elements/nav.html"); 
    });
    $(function(){
      $("#banner").load("/elements/banner.html"); 
    });
    $(function(){
      $("#tagline").load("/elements/tagline.html"); 
    });
    
    

    $(window).scroll(function(){

      scrollEvent($("#navLogo"), 250, logoShow, logoHide);
      scrollEvent($("#banner2Logo"), 200, bannerLogoHide, bannerLogoShow);

      function logoHide(element) {
          element
            .animate({width: '80px'},{duration:100,queue:true},'easeOutQuad')
            .animate({width: '0px'},{duration:300,queue:true},'easeInQuad');
        }

      function logoShow(element) {
        element
          .show()
          .animate({rotate:'-50deg'},{duration:200,queue:false},'easeOutQuad')
          .animate({width: '90px'},{duration:200,queue:true},'easeOutQuad')
          .animate({rotate:'0deg'},{duration:400,queue:false},'easeOutQuad')
          .animate({width: '65px'},{duration:100,queue:true},'easeInOutQuad')
          .animate({width: '70px'},{duration:200,queue:true},'easeInOutQuad');
      }

      function bannerLogoHide(element) {
          element
            .animate({width: '140px'},{duration:100,queue:true},'easeOutQuad')
            .animate({width: '0px'},{duration:300,queue:true},'easeInQuad');
        }

      function bannerLogoShow(element) {
        element
          .show()
          .animate({rotate:'-50deg'},{duration:200,queue:false},'easeOutQuad')
          .animate({width: '140px'},{duration:200,queue:true},'easeOutQuad')
          .animate({rotate:'0deg'},{duration:400,queue:false},'easeOutQuad')
          .animate({width: '110px'},{duration:100,queue:true},'easeInOutQuad')
          .animate({width: '120px'},{duration:200,queue:true},'easeInOutQuad');
      }

      var test = $(".test");
      scrollEvent(test, 'auto', function(){test.fadeIn()});

      function slideIn(element) {
        element
        .animate({
          top: "+50",
          opacity: "0"
        }, 0)
        .show()
        .animate({
          top:"-50",
          opacity:"100%"
        }, 200)
      }

      



      function scrollEvent(element, inputY, func1, func2, uniqueID) {

        var y = $(window).scrollTop();
        var constY = inputY;
        if (inputY === 'auto') {
          constY = $(element).offset().top - $(window).height() + 20;
        }

        
        if (y >= constY) {
          if (!element.hasClass('@%*^!`' + uniqueID)) {
            element.addClass('@%*^!`' + uniqueID);
            func(func1, function(){
              if (y < constY) {
                func(func2);
              }
            });
          }
        } else {
          if (element.hasClass('@%*^!`' + uniqueID)) {
            element.removeClass('@%*^!`' + uniqueID);
            func(func2, function(){
              if (y >= constY) {
                func(func1);
              }
            });
          }
        }

        function func(inputFunc, callback) {
          y = $(window).scrollTop();
          element.stop().dequeue();
          inputFunc(element);
          if (typeof callback === 'function') { 
            y = $(window).scrollTop();
            callback();
          }
        }
    }
  });
    </script>
</head>
<body>
    <div id="nav"></div>
    <div id="banner"></div>
    <div id="tagline"></div>
    <p class="mario">mario</p>
    <br><br><br><br><br>
    <h1 class="test">testerino</h1>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
